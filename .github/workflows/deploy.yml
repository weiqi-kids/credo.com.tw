name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 正式網域切換總開關：設 repo 變數 CUSTOM_DOMAIN=credo.com.tw 即切換；
      # 未設時維持 GitHub Pages 子路徑（不影響現站）。
      - name: Write CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > public/CNAME
      - name: Font-size gate
        run: node scripts/check-fontsize.mjs
      - name: AI-tone gate
        run: node scripts/audit-ai-tone.mjs
      - name: Image gate
        run: node scripts/audit-images.mjs
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22
        env:
          BASE_PATH: ${{ vars.CUSTOM_DOMAIN != '' && '/' || '/credo.com.tw' }}
          SITE_URL: ${{ vars.CUSTOM_DOMAIN != '' && format('https://{0}', vars.CUSTOM_DOMAIN) || 'https://weiqi-kids.github.io' }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

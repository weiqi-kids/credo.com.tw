<header class="site-header">
  <div class="container">
    <a class="site-logo" href="../"><img src="../assets/img/logo.png" alt="詠業商略顧問有限公司"></a>

<main id="main">

  <section class="section">
    <div class="container">
      <h2 class="section-title">如何啟動服務流程</h2>
      <p class="section-sub">服務流程，詠業CREDO都經過律師審約，且經過公證人公證後，合約也會送達法院。而其餘惱人的繁瑣細節，詠業CREDO也已簽訂專業合約保護我們詠業的客戶！</p>
      <div class="qr-block">
        <img src="../assets/img/line-qrcode.png" alt="詠業 LINE 官方帳號 QR-CODE">
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="steps">
        <div class="step">
          <img src="../assets/img/step-1.png" alt="掃描QR-CODE">

        </div>
        <div class="step">
          <img src="../assets/img/step-2.png" alt="選購方案">
          <p>直接在圖文選單點擊購買方案，選擇服務/訂閱類型，付款完畢即可運作。</p>
        </div>
        <div class="step">
          <img src="../assets/img/step-3.png" alt="啟動服務">
          <p>按照合約，直接執行或於委任要件啟動後執行滾動式服務。</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section cta">

      <a class="btn btn--ghost" href="../">回首頁</a>
